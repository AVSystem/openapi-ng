openapi: 3.0.3
info:
  title: Multi Tag Operation
  version: 1.0.0
paths:
  /pets:
    get:
      operationId: listPetsAndShelters
      tags:
        - Pet
        - Shelter
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PetList'
components:
  schemas:
    Pet:
      type: object
      required:
        - id
      properties:
        id:
          type: string
    PetList:
      type: array
      items:
        $ref: '#/components/schemas/Pet'
