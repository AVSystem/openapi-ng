openapi: 3.0.3
info: { title: discriminator-mapping-external-ref, version: '1.0.0' }
paths: {}
components:
  schemas:
    Pet:
      oneOf:
        - $ref: '#/components/schemas/Cat'
        - $ref: '#/components/schemas/Dog'
      discriminator:
        propertyName: kind
        mapping:
          feline: 'http://example.com/schemas/Cat'
          canine: '#/components/schemas/Dog'
    Cat:
      type: object
      required: [kind]
      properties:
        kind: { type: string }
    Dog:
      type: object
      required: [kind]
      properties:
        kind: { type: string }
